<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule Chatbot</title>
</head>
<body>
    <h1>Schedule Chatbot</h1>

    <form method="POST" enctype="multipart/form-data">
        <label for="input_text">Ask a question:</label>
        <input type="text" id="input_text" name="input_text" value="{{ input_text }}">
        
        <h3>Upload schedule file(s):</h3>
        <input type="file" name="schedule_files" multiple>
        
        <h3>Or select from preloaded schedules:</h3>
        <select name="preloaded_schedule">
            <option value="">Select a schedule</option>
            {% for key in preloaded_data.keys() %}
                <option value="{{ key }}">{{ key }}</option>
            {% endfor %}
        </select>

        <button type="submit">Submit</button>
    </form>

    {% if output %}
        <h3>Response:</h3>
        <ul>
            {% for line in output %}
                <li>{{ line }}</li>
            {% endfor %}
        </ul>
    {% elif error_message %}
        <p style="color:red">{{ error_message }}</p>
    {% endif %}
</body>
</html>
